name: travel_map_archiver
description: 여행 사진 메타데이터 추출 및 아카이빙 앱
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # 한국어 포함 다국어 지원
  flutter_localizations:
    sdk: flutter

  # 사진첩 접근 및 에셋 관리
  photo_manager: ^3.3.0

  # EXIF 메타데이터 파싱
  exif: ^3.3.0

  # 날짜/시간 포맷팅
  intl: ^0.20.2

  # 아이콘
  cupertino_icons: ^1.0.6
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
